name: Lint, Build, Test & Analyse

on:
  pull_request:
    branches: [ master ]
    types: [opened, synchronize, reopened]
  schedule:
    - cron: "0 5 * * *" # every day at 5 am

permissions:
  contents: read
  actions: read
  security-events: write
  pull-requests: write
  statuses: write
  checks: write

jobs:
  pipeline:
    runs-on: ubuntu-latest

    steps:
      # 1. Initialization
      - name: Checkout code
        uses: actions/checkout@9c091bb21b7c1c1d1991bb908d89e4e9dddfe3e0 # v7.0.0
        with:
          fetch-depth: 0 # Required for deep Sonar and Super-Linter structural analysis

      # 2. Static Code Analysis (Linting)
      - name: Run Super-Linter
        uses: github/super-linter@4ce20838b8ab83717e78138c5b3a1407148e0918 # v8.7.0
        env:
          DEFAULT_BRANCH: master
          GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}
          VALIDATE_KOTLIN: true
          VALIDATE_ALL_CODEBASE: false
          ENABLE_GITHUB_ACTIONS_STEP_SUMMARY: true

      # 3. Environment Setup
      - name: Set up JDK 21
        uses: actions/setup-java@1bcf9fb12cf4aa7d266a90ae39939e61372fe520 # v5.4.0
        with:
          java-version: '21'
          distribution: 'temurin'

      - name: Set up Gradle
        uses: gradle/actions/setup-gradle@3f131e8634966bd73d06cc69884922b02e6faf92 # v6.2.0

      # 4. Security Scanning Setup (CodeQL Init)
      - name: Initialize CodeQL
        uses: github/codeql-action/init@8aad20d150bbac5944a9f9d289da16a4b0d87c1e # v4.36.2
        with:
          languages: java-kotlin
          build-mode: manual
          config: |
            paths-ignore:
              - '**/*.gradle.kts'
              - 'settings.gradle.kts'
              - 'build.gradle.kts'

      # 5. Remote Cache Provisioning
      - name: Cache SonarQube packages
        uses: actions/cache@2c8a9bd7457de244a408f35966fab2fb45fda9c8 # v6.0.0
        with:
          path: ~/.sonar/cache
          key: ${{ runner.os }}-sonar
          restore-keys: ${{ runner.os }}-sonar

      # 6. Combined Compilation, Testing & Sonar Execution
      # Executing 'build' covers compile, tests, and jacoco
      - name: Build, Test and Analyze Project (Sonar)
        env:
          GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}
          SONAR_TOKEN: ${{ secrets.SONAR_TOKEN }}
        # Only run Sonar if the SONAR_TOKEN secret is actually available (e.g., internal branches/cron)
        run: |
          if [ -n "${{ secrets.SONAR_TOKEN }}" ]; then
            ./gradlew clean build sonar --info
          else
            echo "SONAR_TOKEN is missing (likely a fork PR). Skipping Sonar analysis but running the build."
            ./gradlew clean build --info
          fi

      # 7. Finalize Security Scanning (CodeQL Analysis)
      - name: Perform CodeQL Analysis
        uses: github/codeql-action/analyze@8aad20d150bbac5944a9f9d289da16a4b0d87c1e # v4.36.2

      # 8. Test Reporting & Artifact Archiving
      - name: Upload Test Results
        uses: actions/upload-artifact@043fb46d1a93c77aae656e7c1c64a875d1fc6a0a # v7.0.1
        with:
          name: junit-test-results
          path: build/test-results/test

      - name: Upload HTML Test Report
        uses: actions/upload-artifact@043fb46d1a93c77aae656e7c1c64a875d1fc6a0a # v7.0.1
        with:
          name: junit-html-report
          path: build/reports/tests/test

      - name: Upload Code Coverage Report
        uses: actions/upload-artifact@043fb46d1a93c77aae656e7c1c64a875d1fc6a0a # v7.0.1
        with:
          name: code-coverage-report
          path: build/reports/jacoco/test/html

      # 9. Test Report Summary
      - name: Report Test Summary
        uses: dorny/test-reporter@a43b3a5f7366b97d083190328d2c652e1a8b6aa2 # v3.0.0
        with:
          name: JUnit Tests
          path: build/test-results/test/TEST-*.xml
          reporter: java-junit